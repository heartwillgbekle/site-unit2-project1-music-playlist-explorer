<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Playlist Explorer</title>
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="home.css">
</head>
<body class="home-page">
    <!-- Full-Screen Carousel -->
    <div class="carousel-container" role="region" aria-label="Featured playlists carousel">
        <div class="carousel-wrapper" id="carouselWrapper">
            <!-- Slides populated dynamically by home.js -->
        </div>

        <!-- Navigation Arrows -->
        <button class="carousel-prev" id="carouselPrev" aria-label="Previous playlist">
            <span>‹</span>
        </button>
        <button class="carousel-next" id="carouselNext" aria-label="Next playlist">
            <span>›</span>
        </button>

        <!-- Indicator Dots -->
        <div class="carousel-indicators" id="carouselIndicators">
            <!-- Dots populated dynamically -->
        </div>
    </div>

    <!-- Top Navigation -->
    <div class="top-nav">
        <a href="index.html" class="explore-btn">
            Explore All Playlists
        </a>
    </div>

    <!-- Hero Content Overlay -->
    <div class="hero-content">
        <h1 class="hero-tagline">Your soundtrack starts here</h1>
    </div>

    <!-- Modal (copied from index.html) -->
    <div class="modal-overlay" id="playlistModal" hidden>
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <!-- Modal Header with Action Buttons -->
            <header class="modal-header">
                <button class="shuffle-btn" aria-label="Shuffle playlist">
                    <span class="shuffle-icon">🔁</span>
                </button>
                <button class="close-btn" aria-label="Close modal">
                    <span class="close-icon">✕</span>
                </button>
            </header>

            <!-- Modal Body with Playlist Details -->
            <div class="modal-body">
                <img src="assets/img/playlist.png" alt="Playlist cover" class="modal-playlist-cover">
                <h2 class="modal-playlist-title">Playlist Title</h2>
                <p class="modal-playlist-creator">by Creator</p>

                <!-- AI-Generated Description -->
                <div class="playlist-description-container">
                    <button class="get-description-btn" aria-label="Generate playlist description">
                        <span class="button-text">AI Description</span>
                    </button>
                    <p class="playlist-description" hidden></p>
                    <p class="description-error" hidden></p>
                </div>

                <!-- Track List -->
                <ul class="track-list">
                    <!-- Tracks will be dynamically populated -->
                </ul>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="home.js"></script>
</body>
</html>
